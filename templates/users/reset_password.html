{% extends 'base.html' %}
{% block title %}Reset Password — LocalServe{% endblock %}

{% block extra_css %}
<style>
    .page-wrap { min-height:90vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { background:white; border-radius:20px; padding:2.5rem; width:100%; max-width:440px; border:1px solid var(--border); box-shadow:0 8px 30px rgba(0,0,0,0.08); }
    .card h2 { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--dark); margin-bottom:0.3rem; }
    .card p  { color:var(--muted); font-size:0.88rem; margin-bottom:1.8rem; }
    .submit-btn { width:100%; padding:0.9rem; background:var(--orange); color:white; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .submit-btn:hover { background:#e8440f; }
    .password-wrap { position:relative; }
    .password-wrap input { padding-right:3rem; }
    .toggle-pw { position:absolute; right:1rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); }
</style>
{% endblock %}

{% block content %}
<div class="page-wrap">
    <div class="card">
        <h2>Set New Password 🔒</h2>
        <p>Choose a strong password for your account</p>

        <form method="POST" action="{% url 'reset_password' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>New Password</label>
                <div class="password-wrap">
                    <input type="password" name="password" id="pw1"
                           placeholder="Min 6 characters" autofocus required>
                    <button type="button" class="toggle-pw" onclick="togglePw('pw1')">👁</button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="password-wrap">
                    <input type="password" name="password2" id="pw2"
                           placeholder="Repeat password" required>
                    <button type="button" class="toggle-pw" onclick="togglePw('pw2')">👁</button>
                </div>
            </div>
            <button type="submit" class="submit-btn">Reset Password →</button>
        </form>
    </div>
</div>
<script>
function togglePw(id) {
    const f = document.getElementById(id)
    f.type = f.type === 'password' ? 'text' : 'password'
}
</script>
{% endblock %}
